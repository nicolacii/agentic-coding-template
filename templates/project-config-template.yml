# Project Configuration
# Generated by /init-project skill
# Edit manually to reconfigure or run /init-project --reconfigure

project:
  name: "My Project"
  type: "greenfield" # greenfield | migration | maintenance | library | content
  initialized: "2026-04-08"

stack:
  languages:
    - typescript
    # - python
    # - go
    # - rust
  frameworks:
    - react
    # - fastapi
  testing:
    - vitest
    # - playwright
    # - pytest
  styling:
    - scss
    # - tailwind
    # - styled-components

multi_agent:
  enabled: true
  mode: "full" # none | lightweight | full
  roles:
    # Analysts
    - analyst-architect
    - analyst-fe-senior
    # Developers (sequential)
    - developer-types
    - developer-api
    - developer-ui
    # Reviewers
    - reviewer-architect
    - reviewer-fe-senior
    # QA
    - qa

conventions:
  git:
    branch_prefix: ["feat", "fix", "refactor", "docs", "test", "chore"]
    commit_format: "conventional"
    pr_per_task: true
    base_branch: "main"
  code:
    max_component_lines: 200
    max_service_lines: 400
    test_coverage: 80
  architecture: "feature-based" # feature-based | layered | DDD | hexagonal

reference:
  visual_diff:
    enabled: true
    reference_url: "https://production.example.com"
    current_url: "http://localhost:3000"
    threshold_percent: 1
  figma:
    enabled: false
    file_key: ""
  legacy:
    enabled: false
    path: ""
  design_system:
    enabled: false
    path: "src/ui-kit"

custom_skills:
  # Project-specific skills (in addition to .claude/skills/)
  # - path/to/custom-skill.md
